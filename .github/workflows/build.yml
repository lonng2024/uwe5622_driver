name: Build UWE5622 driver for FnOS 6.12.41

on:
  push:
    branches: [ main ]
  workflow_dispatch:

jobs:
  build:
    runs-on: ubuntu-22.04

    steps:
      - name: Checkout driver source and kernel headers
        uses: actions/checkout@v4

      - name: Prepare environment and fix tools
        run: |
          # 解压根正飞牛头文件，直接解压到根目录，保留绝对路径结构
          sudo tar -xzf kernel-headers-6.12.41-trim.tar.gz -C /
          # 复制你的配置文件
          sudo cp $GITHUB_WORKSPACE/config-6.12.41-trim /lib/modules/6.12.41-trim/build/.config
          # 安装所需工具
          sudo apt update && sudo apt install -y build-essential gcc-12-aarch64-linux-gnu linux-headers-$(uname -r)
          # 替换 x86 工具
          HOST_HEADERS=/lib/modules/$(uname -r)/build
          TARGET_HEADERS=/lib/modules/6.12.41-trim/build
          sudo cp ${HOST_HEADERS}/scripts/basic/fixdep ${TARGET_HEADERS}/scripts/basic/fixdep
          sudo cp ${HOST_HEADERS}/scripts/mod/modpost ${TARGET_HEADERS}/scripts/mod/modpost
          sudo chmod +x ${TARGET_HEADERS}/scripts/basic/fixdep ${TARGET_HEADERS}/scripts/mod/modpost

          # 确保 Module.symvers 存在；如果缺失则创建临时符号表
          if [ ! -f ${TARGET_HEADERS}/Module.symvers ]; then
            echo "Module.symvers not found, creating minimal symbol table"
            echo "0x00000001 sched_setscheduler vmlinux EXPORT_SYMBOL_GPL" | sudo tee ${TARGET_HEADERS}/Module.symvers
          else
            echo "Module.symvers found, size: $(stat -c%s ${TARGET_HEADERS}/Module.symvers)"
          fi

      - name: Remove deprecated set_channel assignment
        run: |
          sed -i '/\.set_channel = sprdwl_cfg80211_set_channel,/d' unisocwifi/cfg80211.c

      - name: Build driver modules
        run: |
          cd $GITHUB_WORKSPACE
          make -C /lib/modules/6.12.41-trim/build M=$PWD modules \
               ARCH=arm64 \
               CROSS_COMPILE=aarch64-linux-gnu- \
               CC=aarch64-linux-gnu-gcc-12 \
               BSP_CHIP_ID=uwe5622 \
               WCN_HW_TYPE=sdio \
               CONFIG_WCN_SDIO=y \
               EXTRA_CFLAGS="-I$GITHUB_WORKSPACE/unisocwcn/include -I$GITHUB_WORKSPACE/unisocwcn/platform -include uwe562x_glb.h -include uwe5622_glb.h" \
               CONFIG_RK_WIFI_DEVICE_UWE5622=m \
               CONFIG_WLAN_UWE5622=m \
               CONFIG_TTY_OVERY_SDIO=m

      - name: Upload artifacts
        uses: actions/upload-artifact@v4
        with:
          name: uwe5622-driver-fnos-6.12.41
          path: |
            unisocwifi/*.ko
            unisocwcn/*.ko
            tty-sdio/*.ko
