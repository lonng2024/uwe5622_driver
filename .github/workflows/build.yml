name: Build UWE5622 driver for FnOS 6.12.41

on:
  push:
    branches: [ main ]
  workflow_dispatch:

jobs:
  build:
    runs-on: ubuntu-22.04

    steps:
      - name: Checkout driver source
        uses: actions/checkout@v4

      - name: Install kernel headers for FnOS 6.12.41-trim
        run: |
          # 下载与飞牛内核版本匹配的头文件包（ARM64 架构）
          # 🔁 如果你的飞牛是 x86_64 的，请将下面链接中的 arm64 改为 amd64
          wget https://github.com/ophub/fnnas/releases/download/kernel_fnnas/linux-headers-6.12.41-trim_6.12.41-trim-10_arm64.deb
          
          # 安装头文件包
          sudo apt update && sudo apt install -y ./linux-headers-6.12.41-trim_*.deb
          
          # 头文件安装后，/lib/modules/6.12.41-trim/build 会自动指向 /usr/src/linux-headers-6.12.41-trim
          # 确认一下链接存在
          ls -l /lib/modules/6.12.41-trim/build

      - name: Install build tools
        run: sudo apt install -y build-essential

      - name: Build driver modules
        run: |
          cd $GITHUB_WORKSPACE
          make -C /lib/modules/6.12.41-trim/build M=$PWD modules \
               CONFIG_RK_WIFI_DEVICE_UWE5622=m \
               CONFIG_WLAN_UWE5622=m \
               CONFIG_TTY_OVERY_SDIO=m

      - name: Upload artifacts
        uses: actions/upload-artifact@v4
        with:
          name: uwe5622-driver-fnos-6.12.41
          path: |
            unisocwifi/*.ko
            unisocwcn/*.ko
            tty-sdio/*.ko
