name: Build UWE5622 driver for FnOS 6.12.41

on:
  push:
    branches: [ main ]
  workflow_dispatch:

jobs:
  build:
    runs-on: ubuntu-22.04

    steps:
      - name: Checkout driver source
        uses: actions/checkout@v4

      - name: Download and prepare kernel source
        run: |
          # 下载完整内核源码包
          wget https://github.com/ophub/fnnas/releases/download/fnnas_debs/6.12.41.tar.gz
          sudo tar -xzf 6.12.41.tar.gz -C /usr/src/
          
          # 找到解压出的内核目录（匹配 6.12.41）
          KERNEL_DIR=$(ls /usr/src/ | grep '6\.12\.41' | head -1)
          echo "KERNEL_DIR=$KERNEL_DIR" >> $GITHUB_ENV
          
          # 进入源码目录，复制配置文件并生成完整的构建系统
          cd /usr/src/$KERNEL_DIR
          sudo cp $GITHUB_WORKSPACE/config-6.12.41-trim .config
          
          # 🌟 关键步骤：根据 .config 生成所有必需的构建文件
          sudo make olddefconfig
          sudo make modules_prepare
          
          # 建立标准编译链接
          sudo mkdir -p /lib/modules/6.12.41-trim
          sudo ln -sf /usr/src/$KERNEL_DIR /lib/modules/6.12.41-trim/build

      - name: Install build tools
        run: sudo apt update && sudo apt install -y build-essential bc flex bison

      - name: Build driver modules
        run: |
          cd $GITHUB_WORKSPACE
          make -C /lib/modules/6.12.41-trim/build M=$PWD modules \
               CONFIG_RK_WIFI_DEVICE_UWE5622=m \
               CONFIG_WLAN_UWE5622=m \
               CONFIG_TTY_OVERY_SDIO=m

      - name: Upload artifacts
        uses: actions/upload-artifact@v4
        with:
          name: uwe5622-driver-fnos-6.12.41
          path: |
            unisocwifi/*.ko
            unisocwcn/*.ko
            tty-sdio/*.ko
