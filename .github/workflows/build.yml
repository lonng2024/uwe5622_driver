name: Build UWE5622 driver for FnOS 6.12.41

on:
  push:
    branches: [ main ]
  workflow_dispatch:          # 允许手动触发

jobs:
  build:
    runs-on: ubuntu-22.04

    steps:
      # 第一步：检出驱动源码和头文件包
      - name: Checkout driver source and kernel headers
        uses: actions/checkout@v4

      # 第二步：解压根正的飞牛头文件到标准位置
      - name: Extract kernel headers from package
        run: |
          # 创建目标 module 目录
          sudo mkdir -p /lib/modules/6.12.41-trim
          # 解压根正头文件包，因为打包时使用了 -h 选项，内容将直接展开
          sudo tar -xzf kernel-headers-6.12.41-trim.tar.gz -C /lib/modules/6.12.41-trim
          # 确保头文件可用（简单验证）
          ls -ld /lib/modules/6.12.41-trim/build/include

      # 第三步：安装基础编译工具
      - name: Install build tools
        run: sudo apt update && sudo apt install -y build-essential

      # 第四步：编译驱动模块
      - name: Build driver modules
        run: |
          cd $GITHUB_WORKSPACE
          make -C /lib/modules/6.12.41-trim/build M=$PWD modules \
               CONFIG_RK_WIFI_DEVICE_UWE5622=m \
               CONFIG_WLAN_UWE5622=m \
               CONFIG_TTY_OVERY_SDIO=m

      # 第五步：上传编译好的 .ko 文件
      - name: Upload artifacts
        uses: actions/upload-artifact@v4
        with:
          name: uwe5622-driver-fnos-6.12.41
          path: |
            unisocwifi/*.ko
            unisocwcn/*.ko
            tty-sdio/*.ko
