name: Build UWE5622 driver for FnOS 6.12.41

on:
  push:
    branches: [ main ]
  workflow_dispatch:

jobs:
  build:
    runs-on: ubuntu-22.04

    steps:
      - name: Checkout driver source
        uses: actions/checkout@v4

      - name: Install Ubuntu mainline kernel headers (6.12.41)
        run: |
          wget https://kernel.ubuntu.com/mainline/v6.12.41/arm64/linux-headers-6.12.41-060641-generic_6.12.41-060641.202502071238_arm64.deb
          wget https://kernel.ubuntu.com/mainline/v6.12.41/arm64/linux-headers-6.12.41-060641_6.12.41-060641.202502071238_all.deb
          sudo apt update
          sudo apt install -y ./linux-headers-6.12.41-060641_*_all.deb ./linux-headers-6.12.41-060641-generic_*_arm64.deb
          sudo mkdir -p /lib/modules/6.12.41-trim
          sudo ln -sf /usr/src/linux-headers-6.12.41-060641-generic /lib/modules/6.12.41-trim/build
          sudo cp $GITHUB_WORKSPACE/config-6.12.41-trim /usr/src/linux-headers-6.12.41-060641-generic/.config

      - name: Install build tools
        run: sudo apt install -y build-essential

      - name: Build driver modules
        run: |
          cd $GITHUB_WORKSPACE
          make -C /lib/modules/6.12.41-trim/build M=$PWD modules \
               CONFIG_RK_WIFI_DEVICE_UWE5622=m \
               CONFIG_WLAN_UWE5622=m \
               CONFIG_TTY_OVERY_SDIO=m

      - name: Upload artifacts
        uses: actions/upload-artifact@v4
        with:
          name: uwe5622-driver-fnos-6.12.41
          path: |
            unisocwifi/*.ko
            unisocwcn/*.ko
            tty-sdio/*.ko
