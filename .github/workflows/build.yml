name: Build UWE5622 driver for FnOS 6.12.41

on:
  push:
    branches: [ main ]
  workflow_dispatch:

jobs:
  build:
    runs-on: ubuntu-22.04

    steps:
      - name: Checkout driver source and kernel headers
        uses: actions/checkout@v4

      - name: Prepare environment and fix tools
        run: |
          sudo mkdir -p /lib/modules/6.12.41-trim
          sudo tar -xzf kernel-headers-6.12.41-trim.tar.gz -C /lib/modules/6.12.41-trim

          # 安装必要工具
          sudo apt update && sudo apt install -y build-essential gcc-12-aarch64-linux-gnu linux-headers-$(uname -r) dos2unix

          HOST_HEADERS=/lib/modules/$(uname -r)/build
          TARGET_HEADERS=/lib/modules/6.12.41-trim/build

          # 替换跨架构工具
          sudo cp ${HOST_HEADERS}/scripts/basic/fixdep ${TARGET_HEADERS}/scripts/basic/fixdep
          sudo cp ${HOST_HEADERS}/scripts/mod/modpost ${TARGET_HEADERS}/scripts/mod/modpost
          sudo chmod +x ${TARGET_HEADERS}/scripts/basic/fixdep ${TARGET_HEADERS}/scripts/mod/modpost

          # 修复飞牛符号表格式：行尾转换、去空行、末尾换行
          sudo dos2unix ${TARGET_HEADERS}/Module.symvers 2>/dev/null || true
          sudo sed -i '/^$/d' ${TARGET_HEADERS}/Module.symvers
          sudo sed -i -e '$a\' ${TARGET_HEADERS}/Module.symvers

          # 从宿主符号表中提取 sched_setscheduler 的正确行（含 CRC）
          HOST_SCHED_LINE=$(grep 'sched_setscheduler' ${HOST_HEADERS}/Module.symvers)
          if [ -n "$HOST_SCHED_LINE" ]; then
            # 删除飞牛表中可能存在的旧 sched_setscheduler 行，然后追加正确行
            sudo sed -i '/sched_setscheduler/d' ${TARGET_HEADERS}/Module.symvers
            echo "$HOST_SCHED_LINE" | sudo tee -a ${TARGET_HEADERS}/Module.symvers > /dev/null
            echo "Added sched_setscheduler from host Module.symvers: $HOST_SCHED_LINE"
          else
            echo "ERROR: sched_setscheduler not found in host Module.symvers"
            exit 1
          fi

      - name: Remove deprecated set_channel assignment
        run: |
          sed -i '/\.set_channel = sprdwl_cfg80211_set_channel,/d' unisocwifi/cfg80211.c

      - name: Build driver modules
        run: |
          cd $GITHUB_WORKSPACE
          make -C /lib/modules/6.12.41-trim/build M=$PWD modules \
               ARCH=arm64 \
               CROSS_COMPILE=aarch64-linux-gnu- \
               CC=aarch64-linux-gnu-gcc-12 \
               BSP_CHIP_ID=uwe5622 \
               WCN_HW_TYPE=sdio \
               CONFIG_WCN_SDIO=y \
               EXTRA_CFLAGS="-I$GITHUB_WORKSPACE/unisocwcn/include -I$GITHUB_WORKSPACE/unisocwcn/platform -include uwe562x_glb.h -include uwe5622_glb.h" \
               CONFIG_RK_WIFI_DEVICE_UWE5622=m \
               CONFIG_WLAN_UWE5622=m \
               CONFIG_TTY_OVERY_SDIO=m

      - name: Upload artifacts
        uses: actions/upload-artifact@v4
        with:
          name: uwe5622-driver-fnos-6.12.41
          path: |
            unisocwifi/*.ko
            unisocwcn/*.ko
            tty-sdio/*.ko
