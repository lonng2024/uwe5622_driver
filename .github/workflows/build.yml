name: Build UWE5622 driver for FnOS 6.12.41

on:
  push:
    branches: [ main ]
  workflow_dispatch:

jobs:
  build:
    runs-on: ubuntu-22.04

    steps:
      - name: Checkout driver source and kernel headers
        uses: actions/checkout@v4

      - name: Prepare environment and fix tools
        run: |
          sudo mkdir -p /lib/modules/6.12.41-trim
          sudo tar -xzf kernel-headers-6.12.41-trim.tar.gz -C /lib/modules/6.12.41-trim

          # 用你重新提取的正确 Module.symvers 覆盖掉原来的
          sudo cp $GITHUB_WORKSPACE/Module.symvers /lib/modules/6.12.41-trim/build/Module.symvers

          # 清洗符号表：删除空行，只保留格式正确的行（地址、符号、模块、导出类型至少4个Tab分隔字段）
          sudo sed -i '/^$/d' /lib/modules/6.12.41-trim/build/Module.symvers
          sudo egrep -v '^[[:space:]]*$' /lib/modules/6.12.41-trim/build/Module.symvers | \
            egrep '^0x[0-9a-fA-F]+\t[^\t]+\t[^\t]+\t[^\t]+' | \
            sudo tee /lib/modules/6.12.41-trim/build/Module.symvers.clean > /dev/null
          sudo mv /lib/modules/6.12.41-trim/build/Module.symvers.clean /lib/modules/6.12.41-trim/build/Module.symvers

          # 添加缺失的 sched_setscheduler 符号（如果尚未存在）
          if ! grep -q 'sched_setscheduler' /lib/modules/6.12.41-trim/build/Module.symvers; then
            printf '0x00000000\tsched_setscheduler\tvmlinux\tEXPORT_SYMBOL_GPL\n' | sudo tee -a /lib/modules/6.12.41-trim/build/Module.symvers > /dev/null
          fi

          # 确保文件以换行结尾
          sudo sed -i -e '$a\' /lib/modules/6.12.41-trim/build/Module.symvers

          # 安装编译工具并替换跨架构工具
          sudo apt update
          sudo apt install -y build-essential gcc-12-aarch64-linux-gnu linux-headers-$(uname -r)

          HOST_HEADERS=/lib/modules/$(uname -r)/build
          TARGET_HEADERS=/lib/modules/6.12.41-trim/build
          sudo cp ${HOST_HEADERS}/scripts/basic/fixdep ${TARGET_HEADERS}/scripts/basic/fixdep
          sudo cp ${HOST_HEADERS}/scripts/mod/modpost ${TARGET_HEADERS}/scripts/mod/modpost
          sudo chmod +x ${TARGET_HEADERS}/scripts/basic/fixdep ${TARGET_HEADERS}/scripts/mod/modpost

      - name: Remove deprecated set_channel assignment
        run: |
          sed -i '/\.set_channel = sprdwl_cfg80211_set_channel,/d' unisocwifi/cfg80211.c

      - name: Build driver modules
        run: |
          cd $GITHUB_WORKSPACE
          make -C /lib/modules/6.12.41-trim/build M=$PWD modules \
               ARCH=arm64 \
               CROSS_COMPILE=aarch64-linux-gnu- \
               CC=aarch64-linux-gnu-gcc-12 \
               BSP_CHIP_ID=uwe5622 \
               WCN_HW_TYPE=sdio \
               CONFIG_WCN_SDIO=y \
               EXTRA_CFLAGS="-I$GITHUB_WORKSPACE/unisocwcn/include -I$GITHUB_WORKSPACE/unisocwcn/platform -include uwe562x_glb.h -include uwe5622_glb.h" \
               CONFIG_RK_WIFI_DEVICE_UWE5622=m \
               CONFIG_WLAN_UWE5622=m \
               CONFIG_TTY_OVERY_SDIO=m

      - name: Upload artifacts
        uses: actions/upload-artifact@v4
        with:
          name: uwe5622-driver-fnos-6.12.41
          path: |
            unisocwifi/*.ko
            unisocwcn/*.ko
            tty-sdio/*.ko
