name: Build UWE5622 driver for FnOS 6.12.41

on:
  push:
    branches: [ main ]
  workflow_dispatch:

jobs:
  build:
    runs-on: ubuntu-22.04

    steps:
      - name: Checkout driver source
        uses: actions/checkout@v4

      - name: Download and prepare kernel source (6.12.41)
        run: |
          # 使用能下得动的 6.12.41 完整内核源码
          wget https://mirrors.ustc.edu.cn/kernel.org/linux/kernel/v6.x/linux-6.12.41.tar.xz
          tar -xJf linux-6.12.41.tar.xz
          mv linux-6.12.41 /usr/src/

          # 将你的 .config 放进源码树
          cp $GITHUB_WORKSPACE/config-6.12.41-trim /usr/src/linux-6.12.41/.config
          cd /usr/src/linux-6.12.41

          # 安装所需工具
          sudo apt update && sudo apt install -y build-essential flex bison bc

          # 两次 make 生成驱动编译所需的全部文件
          sudo make ARCH=arm64 olddefconfig
          sudo make ARCH=arm64 modules_prepare

          # 创建链接（指向刚准备好的源码树）
          sudo mkdir -p /lib/modules/6.12.41-trim
          sudo ln -sf /usr/src/linux-6.12.41 /lib/modules/6.12.41-trim/build

      - name: Build driver modules
        run: |
          cd $GITHUB_WORKSPACE
          make -C /lib/modules/6.12.41-trim/build M=$PWD modules \
               CONFIG_RK_WIFI_DEVICE_UWE5622=m \
               CONFIG_WLAN_UWE5622=m \
               CONFIG_TTY_OVERY_SDIO=m

      - name: Upload artifacts
        uses: actions/upload-artifact@v4
        with:
          name: uwe5622-driver-fnos-6.12.41
          path: |
            unisocwifi/*.ko
            unisocwcn/*.ko
            tty-sdio/*.ko
